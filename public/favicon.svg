<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0d9668"/>
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#shine)"/>
  <!-- Open book - left page -->
  <path d="M11,31 Q11,27 15,28 L47,34 L47,77 L15,71 Q11,70 11,66 Z" fill="white" opacity="0.96"/>
  <!-- Open book - right page -->
  <path d="M89,31 Q89,27 85,28 L53,34 L53,77 L85,71 Q89,70 89,66 Z" fill="white" opacity="0.96"/>
  <!-- Spine -->
  <rect x="45" y="32" width="10" height="46" rx="3" fill="#096e4a"/>
  <!-- Left page — ledger lines (account entries) -->
  <rect x="17" y="41" width="24" height="2.5" rx="1.2" fill="#0d9668" opacity="0.3"/>
  <rect x="17" y="48" width="24" height="2.5" rx="1.2" fill="#0d9668" opacity="0.3"/>
  <rect x="17" y="55" width="18" height="2.5" rx="1.2" fill="#0d9668" opacity="0.3"/>
  <rect x="17" y="62" width="21" height="2.5" rx="1.2" fill="#0d9668" opacity="0.3"/>
  <!-- Right page — checkmark (verified / settled accounts) -->
  <path d="M61,53 L68,61 L83,43" stroke="#0d9668" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.38"/>
</svg>
